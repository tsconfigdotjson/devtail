<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      color: #fafafa;
      font-family: 'Inter Tight', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    /* Grain overlay */
    .grain {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 64px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Top bar */
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wordmark {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fafafa;
    }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #737373;
    }

    /* Headline */
    .headline {
      margin-top: -12px;
    }

    .headline span {
      display: block;
      font-size: 108px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .headline .accent {
      color: #ff3d00;
    }

    /* Bottom bar */
    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #737373;
    }

    .meta {
      display: flex;
      gap: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #404040;
    }

    /* Accent bar decoration */
    .accent-bar {
      position: absolute;
      top: 0;
      left: 72px;
      width: 80px;
      height: 3px;
      background: #ff3d00;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="accent-bar"></div>

  <div class="container">
    <div class="top">
      <div class="wordmark">devtail</div>
      <div class="badge">macOS menu bar app</div>
    </div>

    <div class="headline">
      <span>YOUR TERMINAL</span>
      <span>IS TAKEN.</span>
      <span class="accent">YOUR MENU BAR</span>
      <span class="accent">ISN&rsquo;T.</span>
    </div>

    <div class="bottom">
      <div class="tagline">every process, one menu bar</div>
      <div class="meta">
        <span>Native SwiftUI</span>
        <span>&lt;5 MB</span>
        <span>macOS 14+</span>
      </div>
    </div>
  </div>
</body>
</html>
