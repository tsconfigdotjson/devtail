name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Swift Format
        run: swift format lint --strict --recursive Sources/

      - name: SwiftLint
        run: brew install swiftlint && swiftlint lint --strict

      - name: Build
        run: swift build

      # Split test invocations: running both targets in one `swift test` call
      # on macos-26 trips SIGTRAP when DevtailKit subprocess tests race with
      # devtailAppTests' NSWindow/UserDefaults tests.
      - name: Test DevtailKit
        run: swift test --filter DevtailKitTests

      - name: Test devtail app
        run: swift test --filter devtailAppTests
