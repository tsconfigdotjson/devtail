name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Swift Format
        run: swift format lint --strict --recursive Sources/

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict

      - name: Build
        run: swift build

      - name: Test
        run: swift test
