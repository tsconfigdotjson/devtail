name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Swift Format
        run: swift format lint --strict --recursive Sources/

      - name: SwiftLint
        run: brew install swiftlint && swiftlint lint --strict

      - name: Build
        run: swift build

      - name: Test
        run: swift test --enable-code-coverage

      - name: Coverage report
        run: |
          BIN=$(swift build --show-bin-path)
          PROF="$BIN/codecov/default.profdata"
          XCTEST=$(find "$BIN" -name '*.xctest' -type d | head -1)
          EXEC="$XCTEST/Contents/MacOS/$(basename "$XCTEST" .xctest)"
          xcrun llvm-cov report \
            "$EXEC" \
            -instr-profile="$PROF" \
            -ignore-filename-regex='(.build|Tests)/' \
            -use-color=false
